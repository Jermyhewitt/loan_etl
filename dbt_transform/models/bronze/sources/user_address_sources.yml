version: 2

sources:
  - name: etl_source
    database: etl_source
    schema: etl_source
    tables:
      - name: user_address
        description: "Join table that links users to their addresses"
        columns:
          - name: userId
            description: "Foreign key to the user table"
          - name: addressId
            description: "Foreign key to the address table"