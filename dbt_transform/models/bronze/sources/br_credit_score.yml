version: 2

sources:
  - name: etl_source
    tables:
      - name: credit_score
        columns:
          - name: id
            data_type: bigint(20)
          - name: date
            data_type: datetime(6)
          - name: score
            data_type: bigint(20)
          - name: userid
            data_type: bigint(20)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

