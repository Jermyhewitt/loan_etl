version: 2

sources:
  - name: etl_source
    tables:
      - name: investment
        columns:
          - name: id
            data_type: bigint(20)
          - name: type
            data_type: text
          - name: likes
            data_type: bigint(20)
          - name: total
            data_type: decimal(38,9)
          - name: finish
            data_type: date
          - name: period
            data_type: bigint(20)
          - name: dislikes
            data_type: bigint(20)
          - name: interest
            data_type: bigint(20)
          - name: createdat
            data_type: datetime(6)
          - name: updatedat
            data_type: datetime(6)
          - name: description
            data_type: text
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

