version: 2

sources:
  - name: etl_source
    tables:
      - name: loan_resale
        columns:
          - name: id
            data_type: bigint(20)
          - name: createdat
            data_type: datetime(6)
          - name: fully_sold
            data_type: tinyint(1)
          - name: creditor_id
            data_type: bigint(20)
          - name: resale_price
            data_type: decimal(38,9)
          - name: original_price
            data_type: decimal(38,9)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

