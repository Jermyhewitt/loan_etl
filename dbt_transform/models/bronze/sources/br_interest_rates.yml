            data_type: text
          - name: loantype
            data_type: text
          - name: periodend
            data_type: bigint(20)
          - name: periodstart
            data_type: bigint(20)
          - name: principalend
            data_type: bigint(20)
          - name: interestmethod
            data_type: text
          - name: principalstart
            data_type: bigint(20)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

