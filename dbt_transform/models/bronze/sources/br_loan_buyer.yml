version: 2

sources:
  - name: etl_source
    tables:
      - name: loan_buyer
        columns:
          - name: id
            data_type: bigint(20)
          - name: buyer
            data_type: bigint(20)
          - name: amount
            data_type: decimal(38,9)
          - name: resale_id
            data_type: bigint(20)
          - name: transaction_id
            data_type: bigint(20)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

