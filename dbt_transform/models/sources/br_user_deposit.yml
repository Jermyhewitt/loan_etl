version: 2

sources:
  - name: etl_source
    tables:
      - name: user_deposit
        columns:
          - name: id
            data_type: bigint(20)
          - name: bank
            data_type: text
          - name: amount
            data_type: decimal(38,9)
          - name: branch
            data_type: text
          - name: method
            data_type: text
          - name: status
            data_type: text
          - name: loan_id
            data_type: bigint(20)
          - name: purpose
            data_type: text
          - name: receipt
            data_type: text
          - name: user_id
            data_type: bigint(20)
          - name: createdat
            data_type: datetime(6)
          - name: processed_by
            data_type: bigint(20)
          - name: transferdate
            data_type: datetime(6)
          - name: account_number
            data_type: text
          - name: date_processed
            data_type: datetime(6)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

