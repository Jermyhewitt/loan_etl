version: 2

sources:
  - name: etl_source
    tables:
      - name: withdraw
        columns:
          - name: id
            data_type: bigint(20)
          - name: amount
            data_type: decimal(38,9)
          - name: method
            data_type: text
          - name: user_id
            data_type: bigint(20)
          - name: account_id
            data_type: bigint(20)
          - name: processed_by
            data_type: bigint(20)
          - name: date_processed
            data_type: datetime(6)
          - name: date_requested
            data_type: datetime(6)
          - name: _airbyte_raw_id
            data_type: varchar(36)
          - name: _airbyte_extracted_at
            data_type: timestamp(6)
          - name: _airbyte_meta
            data_type: longtext

